version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arenamind_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arenamind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arenamind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arenamind_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:secret_password@db:5432/arenamind
      - FIREBASE_DATABASE_URL=https://arenamind-default-rtdb.firebaseio.com
      - GEMINI_API_KEY=mock_key
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arenamind_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_FIREBASE_API_KEY=mock_key
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=arenamind.firebaseapp.com
      - NEXT_PUBLIC_FIREBASE_DATABASE_URL=https://arenamind-default-rtdb.firebaseio.com
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=arenamind
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
