name: ArenaMind AI Production Deploy

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: your-gcp-project-id
  GAR_LOCATION: us-central1
  REPOSITORY: arenamind-repo
  REGION: us-central1

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    # Required permissions for authentication via Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Authentication with Google Cloud
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Configure Docker auth
      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Build & Push Backend
      - name: Build & Push Backend Container
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}

      # Build & Push Frontend
      - name: Build & Push Frontend Container
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://arenamind-backend-uc.a.run.app \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      # Deploy Backend to Google Cloud Run
      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: arenamind-backend
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --platform=managed
            --set-env-vars=APP_ENV=production,FIREBASE_DATABASE_URL=https://arenamind-default-rtdb.firebaseio.com
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest

      # Deploy Frontend to Google Cloud Run
      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: arenamind-frontend
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --platform=managed
            --set-env-vars=NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }},NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=arenamind.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=arenamind
